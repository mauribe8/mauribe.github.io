<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Cooking with Marco</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Contact Us</h1>
    </header>
    <div class="layout">
        <nav>
            <a href="index.html">Home</a>
            <a href="pans.html">Pans</a>
            <a href="knives.html">Knives</a>
            <a href="cutting-board.html">Cutting Board</a>
            <a href="contact.html">Contact Us</a>
        </nav>
        <main>
            <section id="contact">
                <h2>Contact Us</h2>
                <p style="margin-bottom:1.5em;font-size:1.08em;font-style:italic;">Want us to review more kitchen equipment? Give us some recommendations!</p>
                <form action="#" method="post" style="max-width:400px;margin:2em auto;display:flex;flex-direction:column;gap:1em;">
                    <label for="firstName">First Name<span style="color:red;">*</span></label>
                    <input type="text" id="firstName" name="firstName" required>

                    <label for="lastName">Last Name<span style="color:red;">*</span></label>
                    <input type="text" id="lastName" name="lastName" required>

                    <label for="dob">Date of Birth</label>
                    <input type="date" id="dob" name="dob">

                    <label for="email">Email Address<span style="color:red;">*</span></label>
                    <input type="email" id="email" name="email" required>

                    <label for="comments">Comments<span style="color:red;">*</span> (max 200 characters)</label>
                    <textarea id="comments" name="comments" maxlength="200" required style="resize:vertical;"></textarea>

                    <button type="submit" style="margin-top:1em;">Submit</button>
                </form>
            </section>
        </main>
    </div>
    <footer>
        <p>Contact: <a href="mailto:umarco252@gmail.com">umarco252@gmail.com</a></p>
    </footer>
</body>
</html>
